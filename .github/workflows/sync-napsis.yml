name: Sync Notas Napsis → Supabase

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Ejecutar sync Napsis → Supabase
        env:
          NAPSIS_URL:           ${{ secrets.NAPSIS_URL }}
          NAPSIS_USER:          ${{ secrets.NAPSIS_USER }}
          NAPSIS_PASS:          ${{ secrets.NAPSIS_PASS }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python napsis_sync.py

      - name: Subir screenshots para debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napsis-screenshots
          path: "*.png"
          retention-days: 3
